<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Image Gallery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="hero">
  <h1 class="title">My Photo Gallery</h1>
  <p class="subtitle">Browse categories, search keywords, and click images to view in full-screen mode.</p>
</div>
<div class="filters">
  <div class="filter-buttons">
    <button class="active" data-filter="all">All</button>
    <button data-filter="nature">Nature</button>
    <button data-filter="city">City</button>
    <button data-filter="animals">Animals</button>
  </div>
  <input id="search" type="search" placeholder="Search photos e.g. mountain, sunset" aria-label="Search images" />
</div>

<section class="section" data-category="nature">
  <h2>Nature</h2>
  <div class="gallery">
    <div class="item"><img src="images/nature2.jpg" alt="Beautiful nature scene" loading="lazy" decoding="async"></div>
    <div class="item"><img src="images/tree.jpg" alt="Majestic tree" loading="lazy" decoding="async"></div>
    <div class="item"><img src="images/nature3.jpg" alt="Nature landscape" loading="lazy" decoding="async"></div>
    <div class="item"><img src="images/nature.jpg" alt="Natural beauty" loading="lazy" decoding="async"></div>
    <div class="item"><img src="images/nature4.jpg" alt="Nature scenery" loading="lazy" decoding="async"></div>
    <div class="item"><img src="images/mountain.jpg" alt="Mountain view" loading="lazy" decoding="async"></div>
    <div class="item"><img src="images/jarna.jpg" alt="Jarna landscape" loading="lazy" decoding="async"></div>
  </div>
</section>

<section class="section" data-category="city">
  <h2>City</h2>
  <div class="gallery">
    <div class="item"><img src="images/city1.jpg" alt="City skyline" loading="lazy" decoding="async"></div>
    <div class="item"><img src="images/city2.jpg" alt="Urban scene" loading="lazy" decoding="async"></div>
    <div class="item"><img src="images/city3.jpg" alt="City architecture" loading="lazy" decoding="async"></div>
    <div class="item"><img src="images/city4.jpg" alt="City lights" loading="lazy" decoding="async"></div>
    <div class="item"><img src="images/city5.jpg" alt="Metropolitan view" loading="lazy" decoding="async"></div>
  </div>
</section>

<section class="section" data-category="animals">
  <h2>Animals</h2>
  <div class="gallery">
    <div class="item"><img src="images/animal1.jpg" alt="Wild animal" loading="lazy" decoding="async"></div>
    <div class="item"><img src="images/animal2.jpg" alt="Animal portrait" loading="lazy" decoding="async"></div>
    <div class="item"><img src="images/animal3.jpg" alt="Animal in nature" loading="lazy" decoding="async"></div>
    <div class="item"><img src="images/animal4.jpg" alt="Animal close-up" loading="lazy" decoding="async"></div>
    <div class="item"><img src="images/animal5.jpg" alt="Animal wildlife" loading="lazy" decoding="async"></div>
  </div>
</section>

<div class="lightbox" id="lightbox" aria-hidden="true" role="dialog" aria-modal="true">
  <span class="close" role="button" aria-label="Close lightbox" tabindex="0">×</span>
  <img id="lightbox-img" alt="Enlarged gallery image">
  <div class="nav">
    <button id="prev" aria-label="Previous image">❮</button>
    <button id="next" aria-label="Next image">❯</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
